services:
  digital-library:
    build: .
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-local}/digital-library:latest
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - library-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/settings"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  library-data:
